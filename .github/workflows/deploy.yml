name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute base path
        id: basepath
        run: |
          repo="${GITHUB_REPOSITORY##*/}"
          repo_lc="$(printf '%s' "$repo" | tr '[:upper:]' '[:lower:]')"
          # Project pages serve under /<repo>; user/org pages (<name>.github.io)
          # and custom domains (a CNAME file) serve at the domain root.
          if [[ "$repo_lc" == *.github.io || -f ./public/CNAME || -f ./CNAME ]]; then
            echo "base_path=" >> "$GITHUB_OUTPUT"
            echo "User/org page or custom domain → base path is empty (root)."
          else
            echo "base_path=/$repo" >> "$GITHUB_OUTPUT"
            echo "Project page → base path is /$repo."
          fi

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.basepath.outputs.base_path }}

      # Disable Jekyll so GitHub Pages serves the _next/ directory as-is.
      - name: Add .nojekyll
        run: touch ./out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
